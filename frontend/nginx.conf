server {
    listen 8080;
    listen [::]:8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — React Router handles routes client-side, so any path
    # that's not a real file should serve index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long-cache static assets (fingerprinted by CRA build output).
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|eot|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Never cache the HTML shell — it points at the latest hashed assets.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}
