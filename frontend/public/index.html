<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2BA89E" />
    <meta name="description" content="Cadence — live student progress dashboards for Jupyter teaching" />
    <!-- Several dashboard URLs (/teacher/live, /teacher/course) carry a
         teacher_token in the query string. strict-origin-when-cross-origin
         sends only the origin (not the full URL with query params) to other
         origins when teachers click external links from a dashboard page,
         so those tokens never leak via the Referer header. Same-origin
         navigation still gets the full URL — that's intra-app and fine. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Cadence</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
