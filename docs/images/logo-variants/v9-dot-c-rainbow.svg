<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Variant 9: 5 dots tracing a C arc, each a distinct colour from the palette
       (smooth indigo → violet → rose → amber → teal journey). -->
  <g transform="translate(8, 12)">
    <!-- Top-right: indigo -->
    <circle cx="48"   cy="11"   r="6" fill="#4338ca"/>
    <!-- Top: violet -->
    <circle cx="28"   cy="6"    r="6" fill="#7c3aed"/>
    <!-- Left: rose -->
    <circle cx="6"    cy="28"   r="6" fill="#e11d48"/>
    <!-- Bottom: amber -->
    <circle cx="28"   cy="50"   r="6" fill="#f59e0b"/>
    <!-- Bottom-right: teal -->
    <circle cx="48"   cy="45"   r="6" fill="#0d9488"/>
  </g>
  <text x="76" y="52" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Cadence</text>
</svg>
