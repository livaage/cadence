<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Variant 10: 5 dots forming a C, three palette colours, indigo on the
       endpoints + amber/teal in the middle — quieter than the rainbow. -->
  <g transform="translate(8, 12)">
    <circle cx="48"   cy="11"   r="6" fill="#4338ca"/>  <!-- indigo -->
    <circle cx="28"   cy="6"    r="6" fill="#f59e0b"/>  <!-- amber -->
    <circle cx="6"    cy="28"   r="6" fill="#0d9488"/>  <!-- teal -->
    <circle cx="28"   cy="50"   r="6" fill="#f59e0b"/>  <!-- amber -->
    <circle cx="48"   cy="45"   r="6" fill="#4338ca"/>  <!-- indigo -->
  </g>
  <text x="76" y="52" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Cadence</text>
</svg>
