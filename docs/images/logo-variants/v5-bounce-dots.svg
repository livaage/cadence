<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Variant 5: Three dots on a bouncing arc — implied movement -->
  <g transform="translate(8, 12)">
    <!-- Faint arc the dots "bounce" along -->
    <path d="M 4 50 Q 16 22 28 36 T 52 28"
          fill="none"
          stroke="#cbd5e1"
          stroke-width="1.5"
          stroke-dasharray="2 3"
          stroke-linecap="round"/>
    <!-- Three indigo dots in different sizes, ascending -->
    <circle cx="6" cy="50" r="5" fill="#6366f1"/>
    <circle cx="22" cy="34" r="7" fill="#4338ca"/>
    <circle cx="44" cy="22" r="9" fill="#3730a3"/>
  </g>
  <text x="68" y="52" font-family="Inter, system-ui, sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-0.5">Cadence</text>
</svg>
